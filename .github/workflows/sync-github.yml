name: sync github snapshot

on:
  schedule:
    # every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run snapshot script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-github.mjs

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain src/data/github-snapshot.json)" ]]; then
            echo "no snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/github-snapshot.json
          git commit -m "chore: refresh github snapshot"
          git push
